<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patiëntenportaal - Fysiotherapie Hoogezand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fysio-dark': '#355B36',
                        'fysio-light': '#88AD4B',
                        'fysio-gold': '#E7B24F',
                        'fysio-beige': '#F7F0E8',
                    }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(53, 91, 54, 0.1), 0 8px 10px -6px rgba(53, 91, 54, 0.1);
        }
    </style>
</head>
<body class="bg-fysio-beige font-sans text-slate-800 pb-20 selection:bg-fysio-light/30 min-h-screen">

    <!-- NAVIGATIE BALK (ALTIJD ZICHTBAAR) -->
    <nav class="bg-fysio-dark text-white py-4 px-6 sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#88AD4B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/></svg>
                <div class="flex flex-col">
                    <span class="font-bold tracking-widest uppercase text-xs">Fysiotherapie Hoogezand</span>
                    <span class="text-[9px] tracking-[0.2em] uppercase opacity-80 -mt-1">handtherapie</span>
                </div>
            </div>
            <button id="back-to-portal" onclick="showView('portal')" class="hidden bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 border border-white/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Terug naar overzicht
            </button>
        </div>
    </nav>

    <!-- PORTAAL OVERZICHT -->
    <div id="view-portal" class="max-w-6xl mx-auto px-6 py-12 animate-fade-in-up">
        <header class="mb-12 text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-extrabold text-fysio-dark mb-4 tracking-tight">Waar heb je last van?</h1>
            <p class="text-slate-600 text-lg md:text-xl max-w-2xl leading-relaxed">
                Kies hieronder de klacht of aandoening die op jou van toepassing is, en start direct met jouw persoonlijke hersteltraject.
            </p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- KAART: A-SPECIFIEK -->
            <button onclick="showView('pols')" class="card-hover text-left bg-white rounded-3xl p-8 border border-slate-100 shadow-sm transition-all duration-300 group flex flex-col h-full">
                <div class="bg-fysio-beige w-14 h-14 rounded-2xl flex items-center justify-center text-fysio-dark mb-6 group-hover:bg-fysio-light group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <h3 class="text-2xl font-bold text-fysio-dark mb-3">A-specifieke Polsklachten</h3>
                <p class="text-slate-500 mb-8 flex-grow">Voor aanhoudende pijnklachten zonder duidelijke medische oorzaak of schade.</p>
                <div class="flex items-center text-fysio-light font-bold gap-2">
                    Start Traject
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </div>
            </button>

            <!-- KAART: RADIUS FRACTUUR -->
            <button onclick="showView('radius')" class="card-hover text-left bg-white rounded-3xl p-8 border border-slate-100 shadow-sm transition-all duration-300 group flex flex-col h-full">
                <div class="bg-fysio-beige w-14 h-14 rounded-2xl flex items-center justify-center text-fysio-dark mb-6 group-hover:bg-fysio-light group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 12a2 2 0 1 0-4 0 2 2 0 0 0 4 0Z"/><path d="M19.3 5.3a2.8 2.8 0 0 0-4 0l-10 10a2.8 2.8 0 0 0 4 4l10-10a2.8 2.8 0 0 0 0-4Z"/></svg>
                </div>
                <h3 class="text-2xl font-bold text-fysio-dark mb-3">Gebroken Pols</h3>
                <p class="text-slate-500 mb-8 flex-grow">Revalidatie na een radiusfractuur (zonder operatie), gericht op mobiliteit en kracht.</p>
                <div class="flex items-center text-fysio-light font-bold gap-2">
                    Start Traject
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </div>
            </button>

            <!-- KAART: TRIGGERFINGER -->
            <button onclick="showView('trigger')" class="card-hover text-left bg-white rounded-3xl p-8 border border-slate-100 shadow-sm transition-all duration-300 group flex flex-col h-full">
                <div class="bg-fysio-beige w-14 h-14 rounded-2xl flex items-center justify-center text-fysio-dark mb-6 group-hover:bg-fysio-light group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0a2 2 0 0 0-2-2v0a2 2 0 0 0-2-2v5"/><path d="M8 11V9a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8a5 5 0 0 0 5 5h3a5 5 0 0 0 5-5v-6a2 2 0 0 0-2-2h-1"/></svg>
                </div>
                <h3 class="text-2xl font-bold text-fysio-dark mb-3">Triggerfinger</h3>
                <p class="text-slate-500 mb-8 flex-grow">Conservatieve aanpak bij een haperende vinger om zwelling en pijn te verminderen.</p>
                <div class="flex items-center text-fysio-light font-bold gap-2">
                    Start Traject
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </div>
            </button>
        </div>

        <footer class="mt-20 border-t border-fysio-dark/10 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm text-slate-500">© 2024 Fysiotherapie Hoogezand - Alle rechten voorbehouden.</p>
            <div class="flex gap-6 text-sm font-bold text-fysio-dark">
                <a href="#" class="hover:text-fysio-light transition-colors">Praktijkinformatie</a>
                <a href="#" class="hover:text-fysio-light transition-colors">Contact</a>
            </div>
        </footer>
    </div>

    <!-- IFRAME CONTAINER VOOR DE DOCUMENTEN -->
    <div id="view-document" class="hidden min-h-screen">
        <div id="document-content"></div>
    </div>

    <script>
        // Functie om de weergave te wisselen
        function showView(view) {
            const portal = document.getElementById('view-portal');
            const documentView = document.getElementById('view-document');
            const backBtn = document.getElementById('back-to-portal');
            const content = document.getElementById('document-content');

            // Reset view
            portal.classList.add('hidden');
            documentView.classList.add('hidden');
            backBtn.classList.add('hidden');
            window.scrollTo(0, 0);

            if (view === 'portal') {
                portal.classList.remove('hidden');
            } else {
                documentView.classList.remove('hidden');
                backBtn.classList.remove('hidden');
                
                // Hier laden we de specifieke content van het document
                // Normaal zou je hier een fetch doen, maar voor deze demo 
                // genereren we de HTML direct in de DOM of laden we de content in.
                loadDocumentContent(view, content);
            }
        }

        function loadDocumentContent(type, container) {
            // In een echte productie omgeving zou je hier de losse HTML bestanden laden.
            // Om de interactie binnen één bestand te houden, tonen we een placeholder 
            // of sturen we de gebruiker naar een sectie.
            
            let htmlContent = "";
            
            if (type === 'pols') {
                htmlContent = `<div class="p-8 text-center"><p class="text-fysio-dark font-bold">Het document "A-specifieke Polsklachten" wordt geladen...</p><p class="text-sm opacity-60">Hier zou de volledige revalidatie HTML verschijnen.</p></div>`;
                // Voor de demo in deze chat: de bestanden zijn apart geleverd. 
                // In een echt systeem koppel je deze knoppen aan de specifieke URL's.
                window.open('pols_revalidatie_hoogezand.html', '_self');
            } else if (type === 'radius') {
                window.open('radius_fractuur_hoogezand.html', '_self');
            } else if (type === 'trigger') {
                window.open('triggerfinger_hoogezand.html', '_self');
            }
        }
    </script>
</body>
</html>
